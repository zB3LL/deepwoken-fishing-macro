; ========================================
; CONFIGURAÇÃO DO MACRO - DEEPWOKEN
; ========================================

[Teclas]
; Defina as teclas conforme seus atalhos no jogo
VaraTecla=1          ; Tecla para equipar vara na mão (não é para jogar)
IscaTecla=4          ; Tecla da isca (Chum) no seu inventário
CanilTecla=2         ; Tecla do cantil de água

; ========================================
[Tempos]
; Todos em milissegundos (ms)

DelayClique=15
; ⏱️ Recomendado: 15ms
; Quanto tempo espera entre cada detecção de cor
; Valores: 5-20 (mais baixo = mais responsivo, mais CPU)
; Se ficar andando, aumente para 30-50

DelayIscaVara=700
; ⏱️ Recomendado: 700ms (IMPORTANTE!)
; Tempo entre clicar na isca e clicar para jogar a vara
; Você clica isca, espera esse tempo, depois clica M1
; Valores: 500-1000ms (testado: 700ms funciona perfeito)

DelayCanil=100
; Padrão: 100ms
; Tempo para usar o cantil/caneca de água

; ========================================
[Intervalo de Acoes]
; Todos em SEGUNDOS (s)

IntervaloComer=300
; ⏱️ Recomendado: 300 segundos (5 minutos)
; Quanto tempo espera antes de comer novamente
; Deixe desativado se vai ficar pegando comida sozinho

IntervaloBeberAgua=180
; ⏱️ Recomendado: 180 segundos (3 minutos)
; Quanto tempo espera antes de beber água novamente

; ========================================
[Failsafe]
; Proteção contra travamentos

CiclosFailsafe=30
; Quantos ciclos sem detectar peixe antes de recast
; Se passar de 30 detecções sem peixe, recasta a vara
; Valores: 25-40 (quanto maior = mais tolerante)

; ========================================
[Loot]
; Ativar (1) ou desativar (0) cada tipo de loot automático

LootReliquias=1
; 1 = Pega relíquias em baús

LootArmas=0
; 0 = NÃO pega armas (desativado por padrão)
; 1 = Pega armas em baús

LootBlueSteel=1
; 1 = Pega BlueSteel em baús

; ========================================
[Discord]
; Opcional: webhook para notificações (deixe em branco para desativar)

webhook=
; Cola seu webhook aqui se quiser notificações no Discord
; Formato: https://discord.com/api/webhooks/...

; ========================================
; NOTAS IMPORTANTES:
; ========================================
; 
; 1. DelayIscaVara é CRÍTICO:
;    - Muito baixo: pode cancelar a pesca
;    - Muito alto: lento demais
;    - 700ms é o testado e funciona perfeito
;
; 2. Se o personagem fica andando:
;    - Aumente DelayClique para 30-50
;    - Verifique se as posições A/S/D estão corretas
;
; 3. As coordenadas (A/S/D) são configuradas no macro:
;    - Pressione Z, X, C para calibrar
;    - Pressione K para ver as coordenadas atuais
;
; 4. Isca é OBRIGATÓRIA:
;    - Sem isca, a pesca não funciona
;    - Coloque Chum (ou outra isca) em um slot
;    - Configure a tecla corretamente
;
; ========================================
